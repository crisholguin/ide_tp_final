<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>IDE IGN - Catálogo de Información Geoespacial</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Segoe UI, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #f0f2f5;
        }


        /* ==========================================
        ENCABEZADO IGN
        ========================================== */

        #encabezado {
            height: 70px;
            background: #242b54;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            color: white;
        }


        /* Logo + Ministerio */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;

        }

        #sitelogo img {
            height: 50px;
        }

        #mindef img {
            height: 42px;
        }


        /* Redes + menú */
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .social {
            display: flex;
            gap: 10px;
        }

        .social img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: .2s;
        }

        .social img:hover {
            opacity: .7;
        }

        nav {
            display: flex;
            gap: 5px;
        }

        nav a {
            background: #4d74a7;
            padding: 8px 14px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 3px 3px 0 0;
            transition: .2s;
        }

        nav a:hover {
            background: #6387b8;
        }


        /* ==========================================
        CONTENEDOR GENERAL
        ========================================== */

        .container {
            display: flex;
            height: calc(100vh - 70px);
        }


        /* ==========================================
        PANEL IZQUIERDO
        ========================================== */

        .sidebar {
            width: 280px;
            background: white;
            padding: 20px;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .search-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-box {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .search-container button {
            padding: 0;
            margin: 0;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .group {
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: .2s;
        }

        .group:hover {
            background: #e6eef7;
        }

        .active {
            background: #dcecff;
            font-weight: bold;
        }

        .grupos-separador {
            border: none;
            border-top: 1px solid #ddd;
            margin: 8px 0 12px;
        }


        /* ==========================================
        PANEL CENTRAL
        ========================================== */

        .resources {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background-image:
                linear-gradient(rgba(229, 228, 224, 0),
                    rgba(229, 228, 224, 1)),
                url("https://www.ign.gob.ar/images/bodybackground.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        /* TARJETAS */
        .card {
            position: relative;
            background: rgba(255, 255, 255, .95);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-shadow:
                0 4px 10px rgba(0, 0, 0, .12);
            transition: .2s;
        }

        .card-badge {
            position: absolute;
            top: 16px;
            right: 20px;
            background: #e6eef7;
            color: #242b54;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: .3px;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #003366;
            padding-right: 130px;
        }


        /* BOTONES */
        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 8px 12px;
            margin-right: 5px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            background: #005ea8;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00407a;
        }


        /* ==========================================
        PANEL METADATOS
        ========================================== */

        .metadata {
            width: 650px;
            background: white;
            padding: 25px;
            border-left: 1px solid #ddd;
            overflow-y: auto;
        }

        .metadata h2 {
            margin-bottom: 20px;
            color: #003366;
        }

        .field {
            margin-bottom: 15px;
        }

        .texto-parrafos {
            white-space: pre-line;
        }

        .label {
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header id="encabezado">
        <div class="header-left">
            <div id="sitelogo">
                <a href="/">
                    <img src="https://static.ign.gob.ar/img/logo/ign/logo_IGN_blanco_sinTexto.svg" alt="IGN">
                </a>
            </div>


            <div id="mindef">
                <a href="https://www.argentina.gob.ar/defensa">
                    <img src="https://static.ign.gob.ar/img/logo/minDef/logo_MinDef_blanco_sinEscudo.svg"
                        alt="Ministerio Defensa">
                </a>
            </div>
        </div>

        <div class="header-right">
            <div class="social">
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_FB.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_Tw_X.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_IG.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_YT.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_mail.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_tel.svg">
                </a>
            </div>

            <nav>
                <a href="#">Nuestros Productos</a>
                <a href="#">Nuestro Instituto</a>
                <a href="#">Nuestras Actividades</a>
                <a href="#">Nuestros Servicios</a>
            </nav>
        </div>
    </header>


    <div class="container">
        <!-- IZQUIERDA -->
        <div class="sidebar">
            <div class="search-container">
                <input type="text" class="search-box" placeholder="Buscar capas..." id="search"
                    onkeydown="if(event.key === 'Enter') buscar()">
                <button onclick="buscar()" title="Buscar" aria-label="Buscar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <h3>Categorías</h3>
            <div id="grupos">
                <!-- Las categorías se generan dinámicamente en generarMenuGrupos() a partir del prefijo de cada capa del WFS -->
            </div>
        </div>

        <!-- CENTRO -->
        <div class="resources">
            <h2 id="tituloGrupo" style="margin-bottom: 15px;">Cargando capas...</h2>
            <div id="listaRecursos"></div>
        </div>

        <!-- DERECHA -->
        <div class="metadata">
            <h2>Metadatos</h2>
            <div id="metadata">
                Seleccione una capa para visualizar
                sus metadatos.
            </div>
        </div>
    </div>

    <script>
        let CONFIG = {};

        let WFS_CAPABILITIES_URL = "";

        const GRUPO_TODOS = "__todas__";
        const ARGENMAP_BASE_URL = "https://mapa.ign.gob.ar/";

        let datos = {};
        let capasActuales = [];

        cargarConfiguracion();


        async function cargarConfiguracion() {

            try {
                console.log("Cargando configuración...");

                const response = await fetch("config.json");

                CONFIG = await response.json();

                WFS_CAPABILITIES_URL = CONFIG.wfs.url;

                console.log("Configuración cargada:");

                console.log(CONFIG);

                cargarCapasWFS();

            }
            catch (error) {
                console.error("Error cargando config:", error);
            }

        }
        async function cargarCapasWFS() {
            try {
                const response = await fetch(WFS_CAPABILITIES_URL);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const texto = await response.text();

                const xml = new DOMParser().parseFromString(texto, "text/xml");

                const featureTypes = Array.from(xml.querySelectorAll("FeatureType"));

                datos = {};

                featureTypes.forEach(ft => {
                    let nombre = ft.querySelector("Name")?.textContent;

                    if (!nombre)
                        return;

                    let titulo = ft.querySelector("Title")?.textContent || nombre;

                    let descripcion = ft.querySelector("Abstract")?.textContent || "Sin descripción";

                    let sistema = ft.querySelector("DefaultCRS")?.textContent || "N/D";

                    // El atributo es xlink:href; buscamos por localName para no depender del prefijo exacto
                    let metadataEl = ft.querySelector("MetadataURL");
                    let metadataURL = metadataEl
                        ? Array.from(metadataEl.attributes).find(attr => attr.localName === "href")?.value || ""
                        : "";

                    let nombreLayer = nombre.split(":").pop();

                    let grupo = nombreLayer.split("_")[0].toLowerCase();


                    if (!datos[grupo]) {
                        datos[grupo] = [];
                    }

                    datos[grupo].push({
                            nombre: titulo,
                            nombreCapa: nombre,
                            nombreLayer,
                            descripcion,
                            sistema,
                            licencia: "CC-BY",
                            metadataURL,
                            grupo
                        });
                });

                generarMenuGrupos();

                cargarGrupo(GRUPO_TODOS);

            }
            catch (error) {
                console.error("Error WFS:", error);
                document.getElementById("listaRecursos").innerHTML = `Error: ${error.message}`;
            }

        }

        function generarMenuGrupos() {
            const contenedorGrupos =
                document.getElementById(
                    "grupos"
                );

            contenedorGrupos.innerHTML = "";

            // Opción "Todas las capas": muestra el catálogo completo sin filtrar por prefijo
            const divTodas = document.createElement("div");
            divTodas.className = "group";
            divTodas.textContent = "Todas las capas";
            divTodas.dataset.grupo = GRUPO_TODOS;
            divTodas.onclick = () => cargarGrupo(GRUPO_TODOS);
            contenedorGrupos.appendChild(divTodas);

            const separador = document.createElement("hr");
            separador.className = "grupos-separador";
            contenedorGrupos.appendChild(separador);

            Object.keys(datos)
                .sort()
                .forEach(grupo => {

                    const div = document.createElement("div");

                    div.className = "group";

                    div.textContent = CONFIG.grupos[grupo] || grupo;

                    div.dataset.grupo = grupo;

                    div.onclick = () => cargarGrupo(grupo);

                    contenedorGrupos.appendChild(div);

                });

        }

        function renderizarCapas(lista) {
            let baseURL = WFS_CAPABILITIES_URL.split("?")[0];
            let html = "";

            lista.forEach((capa, index) => {
                let botonesHTML = `
                    <button onclick='mostrarMetadatos(${index})'>Metadatos</button>`;

                CONFIG.formatos.forEach(formato => {
                    let url = `${baseURL}?service=WFS&version=2.0.0&request=GetFeature&typeName=${capa.nombreCapa}&outputFormat=${encodeURIComponent(formato.tipo)}`.replace(/\s/g, '');
                    botonesHTML += `
                    <a href="${url}" target="_blank"><button>${formato.nombre}</button></a>`;
                });

                const urlArgenmap = `${ARGENMAP_BASE_URL}?zoom=4&lat=-40&lng=-59&layers=${encodeURIComponent(capa.nombreLayer)}`;

                botonesHTML += `
                    <a href="${urlArgenmap}" target="_blank"><button>Ver recurso</button></a>`;

                const nombreGrupo = CONFIG.grupos[capa.grupo] || capa.grupo;

                html += `
            <div class="card">
                <span class="card-badge">${nombreGrupo}</span>
                <h3>${capa.nombre}</h3>
                <p>${capa.descripcion}</p>
                <div class="buttons">
                    ${botonesHTML}
                </div>
            </div>`;
            });

            return html;
        }

        function cargarGrupo(grupo) {
            let contenedor = document.getElementById("listaRecursos")

            document.getElementById("tituloGrupo").innerHTML =
                grupo === GRUPO_TODOS ? "Todas las capas" : (CONFIG.grupos[grupo] || grupo);

            document.querySelectorAll(".group").forEach(el => {
                el.classList.toggle("active", el.dataset.grupo === grupo)
            })

            capasActuales = grupo === GRUPO_TODOS
                ? Object.values(datos).flat()
                : (datos[grupo] ?? [])

            contenedor.innerHTML = renderizarCapas(capasActuales);
        }

        // Pre-carga en segundo plano las palabras clave de los metadatos de cada capa,
        // para que el buscador pueda usarlas sin tener que esperar a que el usuario
        // abra el panel de "Metadatos" de cada una
        async function precargarPalabrasClave() {
            const todasLasCapas = Object.values(datos).flat();

            const tareas = todasLasCapas.map(async capa => {
                capa.palabrasClave = [];

                if (!capa.metadataURL) return;

                try {
                    const response = await fetch(capa.metadataURL);
                    if (!response.ok) return;

                    const texto = await response.text();
                    const xmlDoc = new DOMParser().parseFromString(texto, "text/xml");

                    if (xmlDoc.getElementsByTagName("parsererror").length > 0) return;

                    const meta = parsearMetadataISO19139(xmlDoc);
                    capa.palabrasClave = meta.palabrasClave;
                } catch (error) {
                    console.warn(`No se pudieron precargar palabras clave de ${capa.nombreCapa}:`, error);
                }
            });

            await Promise.allSettled(tareas);
            console.log("Palabras clave precargadas para el buscador");
        }

        // Saca tildes y pasa a minúsculas para comparar texto sin distinción de acentos/mayúsculas
        function normalizarTexto(texto) {
            return (texto || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        let palabrasClaveListas = false;
        let promesaPrecarga = null;

        // Se asegura de que las palabras clave estén cargadas antes de buscar,
        // pero solo dispara la descarga la primera vez que hace falta (no al cargar la página)
        async function asegurarPalabrasClave() {
            if (palabrasClaveListas) return;

            if (!promesaPrecarga) {
                promesaPrecarga = precargarPalabrasClave().then(() => {
                    palabrasClaveListas = true;
                });
            }

            await promesaPrecarga;
        }

        async function buscar() {
            const textoBusqueda = normalizarTexto(document.getElementById("search").value.trim());

            if (!textoBusqueda) {
                const grupoActivo = document.querySelector(".group.active")?.dataset.grupo
                    || GRUPO_TODOS;

                cargarGrupo(grupoActivo);
                return;
            }

            document.getElementById("tituloGrupo").innerHTML = "Buscando...";
            document.getElementById("listaRecursos").innerHTML = "<p>Buscando en el catálogo...</p>";

            await asegurarPalabrasClave();

            const resultados = Object.values(datos).flat().filter(capa => {
                const coincideNombre = normalizarTexto(capa.nombre).includes(textoBusqueda);
                const coincideNombreCapa = normalizarTexto(capa.nombreCapa).includes(textoBusqueda);
                const coincidePalabraClave = (capa.palabrasClave || [])
                    .some(palabra => normalizarTexto(palabra).includes(textoBusqueda));

                return coincideNombre || coincideNombreCapa || coincidePalabraClave;
            });

            document.getElementById("tituloGrupo").innerHTML = "Resultados de la búsqueda";

            document.querySelectorAll(".group").forEach(el => el.classList.remove("active"));

            capasActuales = resultados;

            document.getElementById("listaRecursos").innerHTML = resultados.length
                ? renderizarCapas(resultados)
                : "<p>No se encontraron capas que coincidan con la búsqueda.</p>";
        }

        // ==========================================
        // METADATOS EXTENDIDOS (ISO19139 vía GeoNetwork)
        // ==========================================

        // Busca elementos por su nombre local, ignorando el prefijo de namespace (gmd:, gco:, etc.)
        function elementosPorTag(root, localName) {
            if (!root) return [];
            return Array.from(root.getElementsByTagName("*")).filter(e => e.localName === localName);
        }

        function elementoPorTag(root, localName) {
            return elementosPorTag(root, localName)[0] || null;
        }

        function textoPorTag(root, localName) {
            const el = elementoPorTag(root, localName);
            return el ? el.textContent.trim() : "";
        }

        function parsearMetadataISO19139(xmlDoc) {
            const identificationInfo = elementoPorTag(xmlDoc, "MD_DataIdentification");
            const citation = elementoPorTag(identificationInfo, "CI_Citation");
            const pointOfContact = elementoPorTag(identificationInfo, "pointOfContact");
            const bbox = elementoPorTag(identificationInfo, "EX_GeographicBoundingBox");
            const distFormat = elementoPorTag(xmlDoc, "MD_Format");

            return {
                titulo: textoPorTag(citation, "title"),
                fechaPublicacion: textoPorTag(citation, "DateTime"),
                resumen: textoPorTag(identificationInfo, "abstract"),
                autor: textoPorTag(pointOfContact, "individualName"),
                organizacion: textoPorTag(pointOfContact, "organisationName"),
                palabrasClave: elementosPorTag(identificationInfo, "keyword")
                    .map(el => el.textContent.trim())
                    .filter(Boolean),
                restricciones: textoPorTag(identificationInfo, "otherConstraints"),
                formatoDistribucion: textoPorTag(distFormat, "name"),
                extension: bbox ? {
                    oeste: textoPorTag(bbox, "westBoundLongitude"),
                    este: textoPorTag(bbox, "eastBoundLongitude"),
                    sur: textoPorTag(bbox, "southBoundLatitude"),
                    norte: textoPorTag(bbox, "northBoundLatitude")
                } : null,
                linaje: textoPorTag(xmlDoc, "statement")
            };
        }

        function renderMetadatosBasicos(capa) {
            return `
            <div class="field">
                <div class="label">Nombre:</div>
                ${capa.nombre}
            </div>

            <div class="field">
                <div class="label">Descripción:</div>
                <span id="descripcion-capa" class="texto-parrafos">${capa.descripcion}</span>
            </div>

            <div class="field">
                <div class="label">Capa (WFS):</div>
                ${capa.nombreCapa}
            </div>

            <div class="field">
                <div class="label">Sistema referencia:</div>
                ${capa.sistema}
            </div>

            <div class="field">
                <div class="label">Licencia:</div>
                ${capa.licencia}
            </div>`;
        }

        function renderMetadatosExtendidos(meta, catalogUrl) {
            let html = "";

            if (meta.autor || meta.organizacion) {
                html += `
            <div class="field">
                <div class="label">Autor / Organización:</div>
                ${[meta.autor, meta.organizacion].filter(Boolean).join(" — ")}
            </div>`;
            }

            if (meta.fechaPublicacion) {
                html += `
            <div class="field">
                <div class="label">Fecha de publicación:</div>
                ${meta.fechaPublicacion}
            </div>`;
            }

            if (meta.palabrasClave.length) {
                html += `
            <div class="field">
                <div class="label">Palabras clave:</div>
                ${meta.palabrasClave.join(", ")}
            </div>`;
            }

            if (meta.restricciones) {
                html += `
            <div class="field">
                <div class="label">Restricciones de uso:</div>
                <span class="texto-parrafos">${meta.restricciones}</span>
            </div>`;
            }

            if (meta.formatoDistribucion) {
                html += `
            <div class="field">
                <div class="label">Formato de distribución:</div>
                ${meta.formatoDistribucion}
            </div>`;
            }

            if (meta.extension) {
                html += `
            <div class="field">
                <div class="label">Extensión geográfica:</div>
                O: ${meta.extension.oeste} · E: ${meta.extension.este} · S: ${meta.extension.sur} · N: ${meta.extension.norte}
            </div>`;
            }

            if (meta.linaje) {
                html += `
            <div class="field">
                <div class="label">Linaje:</div>
                <span class="texto-parrafos">${meta.linaje}</span>
            </div>`;
            }

            html += `
            <div class="field">
                <a href="${catalogUrl}" target="_blank">Ver XML de metadatos completo</a>
            </div>`;

            return html;
        }

        async function mostrarMetadatos(index) {
            const capa = capasActuales[index];
            const panel = document.getElementById("metadata");

            panel.innerHTML = renderMetadatosBasicos(capa) +
                `<div class="field" id="metadatos-extendidos"><em>Cargando metadatos completos...</em></div>`;

            if (!capa.metadataURL) {
                document.getElementById("metadatos-extendidos").innerHTML = "Esta capa no tiene metadatos vinculados.";
                return;
            }

            try {
                const response = await fetch(capa.metadataURL);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const texto = await response.text();
                const xmlDoc = new DOMParser().parseFromString(texto, "text/xml");

                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("XML de metadatos inválido");
                }

                const meta = parsearMetadataISO19139(xmlDoc);

                if (meta.resumen) {
                    document.getElementById("descripcion-capa").textContent = meta.resumen;
                }

                document.getElementById("metadatos-extendidos").outerHTML =
                    renderMetadatosExtendidos(meta, capa.metadataURL);

            } catch (error) {
                console.error("Error cargando metadatos completos:", error);
                document.getElementById("metadatos-extendidos").innerHTML =
                    `No se pudieron cargar los metadatos completos (${error.message}).
                     <a href="${capa.metadataURL}" target="_blank">Ver en el catálogo</a>`;
            }
        }

    </script>
</body>

</html>
