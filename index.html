<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>IDE IGN - Catálogo de Información Geoespacial</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Segoe UI, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #f0f2f5;
        }


        /* ==========================================
        ENCABEZADO IGN
        ========================================== */

        #encabezado {
            height: 70px;
            background: #242b54;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            color: white;
        }


        /* Logo + Ministerio */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;

        }

        #sitelogo img {
            height: 50px;
        }

        #mindef img {
            height: 42px;
        }


        /* Redes + menú */
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .social {
            display: flex;
            gap: 10px;
        }

        .social img {
            width: 22px;
            height: 22px;
            cursor: pointer;
            transition: .2s;
        }

        .social img:hover {
            opacity: .7;
        }

        nav {
            display: flex;
            gap: 5px;
        }

        nav a {
            background: #4d74a7;
            padding: 8px 14px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 3px 3px 0 0;
            transition: .2s;
        }

        nav a:hover {
            background: #6387b8;
        }


        /* ==========================================
        CONTENEDOR GENERAL
        ========================================== */

        .container {
            display: flex;
            height: calc(100vh - 70px);
        }


        /* ==========================================
        PANEL IZQUIERDO
        ========================================== */

        .sidebar {
            width: 280px;
            background: white;
            padding: 20px;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;

        }

        .group {
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: .2s;
        }

        .group:hover {
            background: #e6eef7;
        }

        .active {
            background: #dcecff;
            font-weight: bold;
        }


        /* ==========================================
        PANEL CENTRAL
        ========================================== */

        .resources {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background-image:
                linear-gradient(rgba(229, 228, 224, 0),
                    rgba(229, 228, 224, 1)),
                url("https://www.ign.gob.ar/images/bodybackground.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        /* TARJETAS */
        .card {
            background: rgba(255, 255, 255, .95);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-shadow:
                0 4px 10px rgba(0, 0, 0, .12);
            transition: .2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #003366;
        }


        /* BOTONES */
        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 8px 12px;
            margin-right: 5px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            background: #005ea8;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00407a;
        }


        /* ==========================================
        PANEL METADATOS
        ========================================== */

        .metadata {
            width: 360px;
            background: white;
            padding: 25px;
            border-left: 1px solid #ddd;
            overflow-y: auto;
        }

        .metadata h2 {
            margin-bottom: 20px;
            color: #003366;
        }

        .field {
            margin-bottom: 15px;
        }

        .label {
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header id="encabezado">
        <div class="header-left">
            <div id="sitelogo">
                <a href="/">
                    <img src="https://static.ign.gob.ar/img/logo/ign/logo_IGN_blanco_sinTexto.svg" alt="IGN">
                </a>
            </div>


            <div id="mindef">
                <a href="https://www.argentina.gob.ar/defensa">
                    <img src="https://static.ign.gob.ar/img/logo/minDef/logo_MinDef_blanco_sinEscudo.svg"
                        alt="Ministerio Defensa">
                </a>
            </div>
        </div>

        <div class="header-right">
            <div class="social">
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_FB.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_Tw_X.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_IG.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_YT.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_mail.svg">
                </a>
                <a href="#">
                    <img src="https://static.ign.gob.ar/img/socialicons/icono_tel.svg">
                </a>
            </div>

            <nav>
                <a href="#">Nuestros Productos</a>
                <a href="#">Nuestro Instituto</a>
                <a href="#">Nuestras Actividades</a>
                <a href="#">Nuestros Servicios</a>
            </nav>
        </div>
    </header>


    <div class="container">
        <!-- IZQUIERDA -->
        <div class="sidebar">
            <input type="text" class="search-box" placeholder="Buscar capas..." id="search" onkeyup="buscar()">

            <h3>Categorías</h3>
            <div id="grupos">
                <!-- Las categorías se generan dinámicamente en generarMenuGrupos() a partir del prefijo de cada capa del WFS -->
            </div>
        </div>

        <!-- CENTRO -->
        <div class="resources">
            <h2 id="tituloGrupo">Cargando capas...</h2>
            <div id="listaRecursos"></div>
        </div>

        <!-- DERECHA -->
        <div class="metadata">
            <h2>Metadatos</h2>
            <div id="metadata">
                Seleccione una capa para visualizar
                sus metadatos.
            </div>
        </div>
    </div>

    <script>
        let CONFIG = {};

        let WFS_CAPABILITIES_URL = "";

        let datos = {};

        cargarConfiguracion();


        async function cargarConfiguracion() {

            try {
                console.log("Cargando configuración...");

                const response = await fetch("config.json");

                CONFIG = await response.json();

                WFS_CAPABILITIES_URL = CONFIG.wfs.url;

                console.log("Configuración cargada:");

                console.log(CONFIG);

                cargarCapasWFS();

            }
            catch (error) {
                console.error("Error cargando config:", error);
            }

        }
        async function cargarCapasWFS() {
            try {
                const response = await fetch(WFS_CAPABILITIES_URL);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const texto = await response.text();

                const xml = new DOMParser().parseFromString(texto, "text/xml");

                const featureTypes = Array.from(xml.querySelectorAll("FeatureType"));

                datos = {};

                featureTypes.forEach(ft => {
                    let nombre = ft.querySelector("Name")?.textContent;

                    if (!nombre)
                        return;

                    let titulo = ft.querySelector("Title")?.textContent || nombre;

                    let descripcion = ft.querySelector("Abstract")?.textContent || "Sin descripción";

                    let sistema = ft.querySelector("DefaultCRS")?.textContent || "N/D";


                    let nombreLayer = nombre.split(":").pop();

                    let grupo = nombreLayer.split("_")[0].toLowerCase();


                    if (!datos[grupo]) {
                        datos[grupo] = [];
                    }

                    datos[grupo].push({
                            nombre: titulo,
                            nombreCapa: nombre,
                            descripcion,
                            sistema,
                            licencia: "CC-BY"
                        });
                });

                generarMenuGrupos();

                let grupos = Object.keys(datos);

                if (grupos.length) {
                    cargarGrupo(grupos[0]);
                }

            }
            catch (error) {
                console.error("Error WFS:", error);
                document.getElementById("listaRecursos").innerHTML = `Error: ${error.message}`;
            }

        }

        function generarMenuGrupos() {
            const contenedorGrupos =
                document.getElementById(
                    "grupos"
                );

            contenedorGrupos.innerHTML = "";

            Object.keys(datos)
                .sort()
                .forEach(grupo => {

                    const div = document.createElement("div");

                    div.className = "group";

                    div.textContent = CONFIG.grupos[grupo] || grupo;

                    div.dataset.grupo = grupo;

                    div.onclick = () => cargarGrupo(grupo);

                    contenedorGrupos.appendChild(div);

                });

        }

        function cargarGrupo(grupo) {
            let contenedor = document.getElementById("listaRecursos")

            contenedor.innerHTML = ""

            document.getElementById("tituloGrupo").innerHTML = CONFIG.grupos[grupo] || grupo;

            document.querySelectorAll(".group").forEach(el => {
                el.classList.toggle("active", el.dataset.grupo === grupo)
            })

            capasActuales = datos[grupo] ?? []

            capasActuales.forEach((capa, index) => {
                let baseURL = WFS_CAPABILITIES_URL.split("?")[0];

                let geojson = `${baseURL}?service=WFS&version=2.0.0&request=GetFeature&typeName=${capa.nombreCapa}&outputFormat=application/json`.replace(/\s/g,'');
                let shp = `${baseURL}?service=WFS&version=2.0.0&request=GetFeature&typeName=${capa.nombreCapa}&outputFormat=shape-zip`.replace(/\s/g,'');
                let kml=`${baseURL}?service=WFS&version=2.0.0&request=GetFeature&typeName=${capa.nombreCapa}&outputFormat=KML`.replace(/\s/g,'');
                

                let botonesHTML=`
                    <button onclick='mostrarMetadatos(${index})'>Metadatos</button>`;

                    CONFIG.formatos.forEach(formato=>{
                        let url = `${baseURL}?service=WFS&version=2.0.0&request=GetFeature&typeName=${capa.nombreCapa}&outputFormat=${encodeURIComponent(formato.tipo)}`.replace(/\s/g,'');
                        botonesHTML+=`
                    <a href="${url}" target="_blank"><button>${formato.nombre}</button></a>`;
                    });
                
                botonesHTML+=`
                    <button>Ver recurso</button>`;    
                contenedor.innerHTML += `
            <div class="card">
                <h3>${capa.nombre}</h3>
                <p>${capa.descripcion}</p>
                <div class="buttons">
                    ${botonesHTML}
                </div>
            </div>`
            })
        }

        function mostrarMetadatos(index) {
            const capa = capasActuales[index]

            document.getElementById("metadata").innerHTML = `
            <div class="field">
                <div class="label">Nombre:</div>
                ${capa.nombre}
            </div>

            <div class="field">
                <div class="label">Descripción:</div>
                ${capa.descripcion}
            </div>

            <div class="field">
                <div class="label">Capa (WFS):</div>
                ${capa.nombreCapa}
            </div>

            <div class="field">
                <div class="label">Sistema referencia:</div>
                ${capa.sistema}
            </div>

            <div class="field">
                <div class="label">Licencia:</div>
                ${capa.licencia}
            </div>`
        }

        function buscar() {
            let texto = document.getElementById("search").value.toLowerCase()

            let cards = document.querySelectorAll(".card")

            cards.forEach(card => {
                if (card.innerText.toLowerCase().includes(texto)) {
                    card.style.display = "block"
                }
                else {
                    card.style.display = "none"
                }

            })
        }
    </script>
</body>

</html>
